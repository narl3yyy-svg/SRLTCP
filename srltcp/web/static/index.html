<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SRLTCP</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --accent-dim: #2563eb;
      --success: #34d399;
      --danger: #f87171;
      --mono: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
      --sans: system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: 0.02em; }
    header h1 span { color: var(--accent); }
    .badge {
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      background: var(--border);
      color: var(--muted);
    }
    .badge.online { background: #064e3b; color: var(--success); }
    main {
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      gap: 0;
      height: calc(100vh - 57px);
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; }
    }
    .panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel:last-child { border-right: none; border-left: 1px solid var(--border); }
    .panel-header {
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-body { flex: 1; overflow-y: auto; padding: 0.5rem; }
    .peer, .link-item {
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 2px;
      transition: background 0.15s;
    }
    .peer:hover, .link-item:hover { background: var(--border); }
    .peer.selected { background: var(--accent-dim); }
    .peer-name { font-weight: 500; font-size: 0.9rem; }
    .peer-meta { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
    .chat-area {
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .msg {
      max-width: 75%;
      padding: 0.6rem 0.9rem;
      border-radius: 12px;
      font-size: 0.9rem;
      word-break: break-word;
    }
    .msg.in { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); }
    .msg.out { align-self: flex-end; background: var(--accent-dim); }
    .msg-time { font-size: 0.65rem; color: var(--muted); margin-top: 4px; }
    .composer {
      display: flex;
      gap: 0.5rem;
      padding: 1rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    input, textarea, button, select {
      font-family: inherit;
      font-size: 0.875rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      padding: 0.5rem 0.75rem;
    }
    input:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: 0; }
    button {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 500;
      white-space: nowrap;
    }
    button:hover { filter: brightness(1.1); }
    button.secondary { background: var(--border); border-color: var(--border); color: var(--text); }
    .composer input { flex: 1; }
    .identity-card {
      padding: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      font-size: 0.8rem;
    }
    .identity-card code {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent);
      word-break: break-all;
    }
    .transfer-item {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
    }
    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 4px;
      overflow: hidden;
    }
    .progress-bar div {
      height: 100%;
      background: var(--success);
      transition: width 0.3s;
    }
    #log {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      padding: 0.5rem;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <header>
    <h1><span>SRL</span>TCP</h1>
    <span class="badge" id="ws-status">connecting…</span>
  </header>
  <main>
    <section class="panel">
      <div class="panel-header">
        Peers
        <button class="secondary" style="padding:0.2rem 0.5rem;font-size:0.7rem" onclick="announce()">Announce</button>
      </div>
      <div class="panel-body" id="peers"></div>
    </section>
    <section class="chat-area">
      <div class="panel-header" id="chat-title">Select a peer</div>
      <div class="messages" id="messages"></div>
      <div class="composer">
        <input type="text" id="msg-input" placeholder="Type a message…" disabled />
        <button id="send-btn" disabled onclick="sendMessage()">Send</button>
      </div>
    </section>
    <section class="panel">
      <div class="panel-header">Identity & Transfers</div>
      <div class="panel-body">
        <div id="identities"></div>
        <div class="panel-header" style="border:none;padding:0.5rem 0;margin-top:0.5rem">Transfers</div>
        <div id="transfers"></div>
        <div class="panel-header" style="border:none;padding:0.5rem 0;margin-top:0.5rem">Event Log</div>
        <div id="log"></div>
      </div>
    </section>
  </main>
  <script>
    let selectedPeer = null;
    let myHashes = {};
    let ws = null;

    function log(msg) {
      const el = document.getElementById('log');
      el.textContent = new Date().toLocaleTimeString() + ' ' + msg + '\n' + el.textContent.slice(0, 2000);
    }

    function connectWs() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host + '/ws');
      ws.onopen = () => {
        document.getElementById('ws-status').textContent = 'connected';
        document.getElementById('ws-status').classList.add('online');
      };
      ws.onclose = () => {
        document.getElementById('ws-status').textContent = 'disconnected';
        document.getElementById('ws-status').classList.remove('online');
        setTimeout(connectWs, 3000);
      };
      ws.onmessage = (ev) => {
        const { type, data } = JSON.parse(ev.data);
        if (type === 'status') { renderStatus(data); }
        else if (type === 'message') { appendMessage(data); }
        else if (type === 'peer_discovered') { loadPeers(); }
        else if (type === 'link_up') { log('Link up: ' + data.name); loadPeers(); }
        else if (type === 'transfer_progress') { renderTransfers(); }
        else if (type === 'transfer_complete') { log('Transfer complete: ' + data.filename); renderTransfers(); }
        else if (type === 'transport_event') { log('Transport: ' + data.kind); }
      };
    }

    async function loadPeers() {
      const res = await fetch('/api/peers');
      const peers = await res.json();
      const el = document.getElementById('peers');
      el.innerHTML = peers.map(p => `
        <div class="peer ${selectedPeer === p.hash_id ? 'selected' : ''}" onclick="selectPeer('${p.hash_id}', '${p.name}')">
          <div class="peer-name">${p.name}</div>
          <div class="peer-meta">${p.hash_id.slice(0,12)}… · ${p.transport}</div>
        </div>
      `).join('') || '<div style="padding:1rem;color:var(--muted)">No peers discovered</div>';
    }

    function renderStatus(data) {
      const ids = data.identities || {};
      myHashes = {};
      document.getElementById('identities').innerHTML = Object.entries(ids).map(([t, id]) => {
        myHashes[t] = id.hash_id;
        return `<div class="identity-card"><strong>${t.toUpperCase()}</strong><br>${id.name}<br><code>${id.hash_id}</code></div>`;
      }).join('');
      loadPeers();
      renderTransfers();
    }

    async function renderTransfers() {
      const res = await fetch('/api/transfers');
      const transfers = await res.json();
      document.getElementById('transfers').innerHTML = transfers.map(t => {
        const pct = t.size ? Math.round((t.offset / t.size) * 100) : 0;
        return `<div class="transfer-item">
          <div>${t.filename} <span style="color:var(--muted)">${t.state}</span></div>
          <div class="progress-bar"><div style="width:${pct}%"></div></div>
        </div>`;
      }).join('') || '<div style="padding:0.5rem;color:var(--muted);font-size:0.8rem">No active transfers</div>';
    }

    function selectPeer(hashId, name) {
      selectedPeer = hashId;
      document.getElementById('chat-title').textContent = 'Chat · ' + name;
      document.getElementById('msg-input').disabled = false;
      document.getElementById('send-btn').disabled = false;
      loadPeers();
      loadMessages();
      connectPeer(hashId);
    }

    async function connectPeer(hashId) {
      await fetch('/api/connect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hash_id: hashId, transport: 'tcp' }),
      });
      log('Connecting to ' + hashId.slice(0, 12) + '…');
    }

    async function loadMessages() {
      const res = await fetch('/api/messages');
      const msgs = await res.json();
      const el = document.getElementById('messages');
      const filtered = selectedPeer
        ? msgs.filter(m => m.sender_hash === selectedPeer || m.recipient_hash === selectedPeer)
        : msgs;
      el.innerHTML = filtered.map(m => {
        const out = Object.values(myHashes).includes(m.sender_hash);
        return `<div class="msg ${out ? 'out' : 'in'}">${escapeHtml(m.text)}<div class="msg-time">${m.status}</div></div>`;
      }).join('');
      el.scrollTop = el.scrollHeight;
    }

    function appendMessage(m) {
      if (selectedPeer && m.sender_hash !== selectedPeer && m.recipient_hash !== selectedPeer) return;
      const el = document.getElementById('messages');
      const out = Object.values(myHashes).includes(m.sender_hash);
      el.innerHTML += `<div class="msg ${out ? 'out' : 'in'}">${escapeHtml(m.text)}<div class="msg-time">${m.status}</div></div>`;
      el.scrollTop = el.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text || !selectedPeer) return;
      await fetch('/api/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ recipient_hash: selectedPeer, text, transport: 'tcp' }),
      });
      input.value = '';
    }

    async function announce() {
      await fetch('/api/announce', { method: 'POST' });
      log('Announced on all transports');
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.getElementById('msg-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });

    connectWs();
    fetch('/api/status').then(r => r.json()).then(renderStatus);
  </script>
</body>
</html>
