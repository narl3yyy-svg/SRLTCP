<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SRLTCP</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <button class="version-badge" id="version-badge" onclick="showReleaseNotes()" title="Release notes">v0.1.2</button>
      <h1><span>SRL</span>TCP</h1>
    </div>
    <div class="header-right">
      <button class="secondary" onclick="openModal('settings-modal')">Settings</button>
      <span class="badge" id="ws-status">connecting…</span>
    </div>
  </header>
  <main>
    <section class="panel">
      <div class="panel-header">
        <div class="tabs">
          <button class="tab active" data-tab="discovered" onclick="setPeerTab('discovered')">Discovered</button>
          <button class="tab" data-tab="trusted" onclick="setPeerTab('trusted')">Trusted</button>
        </div>
        <button class="secondary" style="padding:0.2rem 0.5rem;font-size:0.7rem" onclick="announce()">Announce</button>
      </div>
      <div class="panel-body" id="peers"></div>
    </section>
    <section class="chat-area">
      <div class="panel-header" id="chat-title">Select a trusted peer</div>
      <div class="messages" id="messages"></div>
      <div class="composer">
        <input type="hidden" id="peer-transport" value="tcp" />
        <input type="text" id="msg-input" placeholder="Type a message…" disabled />
        <div class="file-input-wrap">
          <input type="file" id="file-input" />
          <button id="file-btn" class="secondary" disabled onclick="sendFile()">Send file</button>
        </div>
        <button id="send-btn" disabled onclick="sendMessage()">Send</button>
      </div>
    </section>
    <section class="panel">
      <div class="panel-header">Identity & Transfers</div>
      <div class="panel-body">
        <div id="identities"></div>
        <div class="section-title">Transfers</div>
        <div id="transfers"></div>
        <div class="section-title">Event Log</div>
        <div id="log"></div>
      </div>
    </section>
  </main>

  <!-- Settings modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal wide">
      <div class="modal-header">
        Settings
        <button class="secondary" onclick="closeModal('settings-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label>Display name</label>
          <input type="text" id="set-name" />
        </div>
        <div class="section-title">Network (TCP/IP)</div>
        <div class="form-row">
          <label>TCP port</label>
          <input type="number" id="set-tcp-port" />
        </div>
        <div class="form-row">
          <label>Web UI port</label>
          <input type="number" id="set-web-port" />
        </div>
        <div class="form-row inline">
          <input type="checkbox" id="set-auto-announce" />
          <label for="set-auto-announce">Auto-announce on network</label>
        </div>
        <div class="form-row inline">
          <input type="checkbox" id="set-relay" />
          <label for="set-relay">Relay mode</label>
        </div>
        <div class="section-title">Serial (USB / RF)</div>
        <div class="form-row inline">
          <input type="checkbox" id="set-enable-serial" />
          <label for="set-enable-serial">Enable serial transport</label>
        </div>
        <div class="form-row">
          <label>Serial port</label>
          <input type="text" id="set-serial-port" placeholder="/dev/ttyUSB0" />
        </div>
        <div class="form-row">
          <label>Baud rate</label>
          <input type="number" id="set-serial-baud" value="115200" />
        </div>
        <div class="section-title">Folders</div>
        <div class="form-row">
          <label>Incoming files folder</label>
          <div class="folder-path">
            <input type="text" id="set-incoming" readonly placeholder="Default: ~/.srltcp/incoming" />
            <button class="secondary" onclick="openFolderPicker('set-incoming')">Browse</button>
          </div>
        </div>
        <div class="form-row">
          <label>Shared folder</label>
          <div class="folder-path">
            <input type="text" id="set-shared" readonly placeholder="Default: ~/.srltcp/shared" />
            <button class="secondary" onclick="openFolderPicker('set-shared')">Browse</button>
          </div>
        </div>
        <div class="section-title">Messages</div>
        <div class="form-row">
          <label>Keep messages</label>
          <select id="set-retention">
            <option value="1d">1 day</option>
            <option value="1w">1 week</option>
            <option value="1m">1 month</option>
            <option value="1y">1 year</option>
            <option value="forever">Forever</option>
            <option value="restart">Until restart</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="danger" onclick="restartApp()">Restart</button>
        <button class="secondary" onclick="closeModal('settings-modal')">Cancel</button>
        <button onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>

  <!-- Folder picker -->
  <div class="modal-overlay" id="folder-modal">
    <div class="modal">
      <div class="modal-header">
        Choose folder
        <button class="secondary" onclick="closeModal('folder-modal')">✕</button>
      </div>
      <div class="modal-body folder-browser">
        <div class="crumb" id="folder-crumb"></div>
        <div id="folder-list"></div>
      </div>
      <div class="modal-footer">
        <button class="secondary" onclick="closeModal('folder-modal')">Cancel</button>
        <button onclick="selectFolder()">Select</button>
      </div>
    </div>
  </div>

  <!-- Release notes -->
  <div class="modal-overlay" id="release-modal">
    <div class="modal wide">
      <div class="modal-header">
        Release Notes
        <button class="secondary" onclick="closeModal('release-modal')">✕</button>
      </div>
      <div class="modal-body release-notes" id="release-notes-body"></div>
      <div class="modal-footer">
        <button onclick="closeModal('release-modal')">Close</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
