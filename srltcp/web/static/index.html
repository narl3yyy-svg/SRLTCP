<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0e14" />
  <title>SRLTCP Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <div class="app" id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-icon">SR</div>
          <div>
            <div class="brand-title">SRLTCP</div>
            <div class="brand-sub" id="connection-status">Connecting…</div>
          </div>
        </div>
        <button class="icon-btn" id="btn-settings" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </div>

      <div class="me-card" id="me-card">
        <div class="avatar me-avatar" id="me-avatar">?</div>
        <div class="me-info">
          <div class="me-name" id="me-name">Loading…</div>
          <div class="me-hash" id="me-hash">—</div>
        </div>
      </div>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="peer-search" placeholder="Search conversations…" autocomplete="off" />
      </div>

      <div class="sidebar-actions">
        <button class="action-btn" id="btn-announce">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><circle cx="12" cy="12" r="2"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/></svg>
          Announce
        </button>
      </div>

      <div class="contacts-label">Discovered Peers</div>
      <nav class="contacts" id="contacts" aria-label="Contacts"></nav>
    </aside>

    <!-- Main chat -->
    <main class="chat" id="chat-panel">
      <div class="chat-empty" id="chat-empty">
        <div class="empty-illustration">
          <svg viewBox="0 0 120 120" fill="none"><circle cx="60" cy="60" r="50" stroke="currentColor" stroke-width="1.5" opacity=".2"/><path d="M35 55c0-14 11-25 25-25s25 11 25 25" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity=".4"/><circle cx="45" cy="58" r="3" fill="currentColor" opacity=".5"/><circle cx="75" cy="58" r="3" fill="currentColor" opacity=".5"/><path d="M48 72c4 6 20 6 24 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity=".4"/></svg>
        </div>
        <h2>Welcome to SRLTCP</h2>
        <p>Select a peer from the sidebar or click <strong>Announce</strong> to discover devices on your network.</p>
        <p class="hint">All messages are end-to-end encrypted.</p>
      </div>

      <div class="chat-active hidden" id="chat-active">
        <header class="chat-header">
          <button class="icon-btn mobile-only" id="btn-back" aria-label="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <div class="avatar peer-avatar" id="peer-avatar">?</div>
          <div class="chat-header-info">
            <div class="chat-peer-name" id="chat-peer-name">Peer</div>
            <div class="chat-peer-status" id="chat-peer-status">
              <span class="status-dot"></span>
              <span id="chat-peer-meta">Connecting…</span>
            </div>
          </div>
          <div class="chat-header-actions">
            <button class="icon-btn" id="btn-file" title="Send file">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <input type="file" id="file-input" class="hidden" />
          </div>
        </header>

        <div class="messages" id="messages" role="log" aria-live="polite"></div>

        <footer class="composer">
          <div class="composer-inner">
            <textarea id="msg-input" rows="1" placeholder="Message…" disabled></textarea>
            <button class="send-btn" id="send-btn" disabled aria-label="Send">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
        </footer>
      </div>
    </main>

    <!-- Settings drawer -->
    <aside class="drawer" id="drawer" aria-hidden="true">
      <div class="drawer-overlay" id="drawer-overlay"></div>
      <div class="drawer-panel">
        <header class="drawer-header">
          <h3>Settings</h3>
          <button class="icon-btn" id="btn-close-drawer" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </header>
        <div class="drawer-body">
          <section class="drawer-section">
            <h4>Your Identities</h4>
            <div id="identities"></div>
          </section>
          <section class="drawer-section">
            <h4>Active Transfers</h4>
            <div id="transfers"></div>
          </section>
          <section class="drawer-section">
            <h4>Activity</h4>
            <div class="activity-log" id="activity-log"></div>
          </section>
        </div>
      </div>
    </aside>

    <div class="toast-container" id="toasts"></div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
