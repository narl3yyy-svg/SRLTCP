name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHONFORANDROID_PREREQUISITES_INSTALL_INTERACTIVE: "0"
  P4A_RELEASE_TAG: master
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.8"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle/caches
          key: ${{ runner.os }}-buildozer-v3-${{ hashFiles('android/buildozer.spec', 'android/p4a-recipes/**') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v3-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git zip unzip \
            openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses-dev libtinfo6 cmake \
            libffi-dev libssl-dev \
            libxml2-dev libxslt1-dev libjpeg-dev \
            libgl1-mesa-dev libgles2-mesa-dev \
            libltdl-dev gettext autopoint wget

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest
          accept-android-sdk-licenses: true
          packages: platforms;android-33 build-tools;33.0.2

      - name: Install Buildozer toolchain
        run: |
          python --version
          pip install --upgrade pip
          pip install "buildozer>=1.5.0" "cython==0.29.34" setuptools
          pip install "git+https://github.com/kivy/python-for-android@${P4A_RELEASE_TAG}"

      - name: Verify Android build config
        working-directory: android
        run: |
          grep -E 'python3==3\.12' buildozer.spec
          grep -E 'android\.archs = arm64-v8a' buildozer.spec
          grep -E 'p4a\.local_recipes = p4a-recipes' buildozer.spec
          test -f p4a-recipes/python3/__init__.py
          test -f p4a-recipes/python3/patches/disable-grp.patch

      - name: Clean stale P4A builds
        run: |
          rm -rf ~/.buildozer/android/platform/build-*
          rm -rf android/.buildozer
          rm -f android/bin/*.apk

      - name: Bootstrap Android SDK and NDK
        run: |
          set -e
          SDK="$ANDROID_HOME"
          SDKMGR="$SDK/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMGR" ]; then
            SDKMGR=$(find "$SDK" -name sdkmanager -type f 2>/dev/null | head -1)
          fi
          if [ -z "$SDKMGR" ] || [ ! -x "$SDKMGR" ]; then
            echo "sdkmanager not found under $SDK"
            find "$SDK" -maxdepth 5 -type f 2>/dev/null | head -30
            exit 1
          fi
          mkdir -p "$HOME/.android/licenses"
          printf '24333f8a63b6825ea9c5514f83c2829b52d4d789\n' > "$HOME/.android/licenses/android-sdk-license"
          printf '84831b9409646a918e30561babd6857c\n' > "$HOME/.android/licenses/android-sdk-preview-license"
          printf 'd975f451698547eaa9f5f62cc9c1b58c\n' > "$HOME/.android/licenses/android-sdk-arm-dbt-license"
          touch "$HOME/.android/repositories.cfg"
          mkdir -p "$SDK/licenses"
          cp "$HOME/.android/licenses/"* "$SDK/licenses/"
          yes | "$SDKMGR" --sdk_root="$SDK" --licenses
          "$SDKMGR" --sdk_root="$SDK" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"
          mkdir -p "$SDK/tools/bin"
          ln -sf "$SDK/cmdline-tools/latest/bin/sdkmanager" "$SDK/tools/bin/sdkmanager"
          test -x "$SDK/tools/bin/sdkmanager"
          test -d "$SDK/ndk/25.2.9519653"
          test -x "$SDK/platform-tools/adb"
          echo "ANDROIDSDK=$SDK" >> "$GITHUB_ENV"
          echo "ANDROIDNDK=$SDK/ndk/25.2.9519653" >> "$GITHUB_ENV"
          mkdir -p "$HOME/.buildozer/android/platform"
          rm -rf "$HOME/.buildozer/android/platform/android-sdk"
          rm -rf "$HOME/.buildozer/android/platform/android-ndk-r25c"
          ln -sfn "$SDK" "$HOME/.buildozer/android/platform/android-sdk"
          ln -sfn "$SDK/ndk/25.2.9519653" "$HOME/.buildozer/android/platform/android-ndk-r25c"
          test -x "$HOME/.buildozer/android/platform/android-sdk/platform-tools/adb"
          test -d "$HOME/.buildozer/android/platform/android-ndk-r25c"

      - name: Build APK
        working-directory: android
        run: |
          set -o pipefail
          test -x "$HOME/.buildozer/android/platform/android-sdk/platform-tools/adb"
          test -d "$HOME/.buildozer/android/platform/android-ndk-r25c"
          buildozer -v android debug 2>&1 | tee ../buildozer.log
          if grep -E 'build-arm64-v8a_armeabi|Creating build for arch armeabi' ../buildozer.log; then
            echo "Unexpected armeabi-v7a build — check android.archs in buildozer.spec"
            exit 1
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SRLTCP-app
          path: android/bin/*.apk
          if-no-files-found: error