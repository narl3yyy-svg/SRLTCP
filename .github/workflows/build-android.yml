name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.gradle/caches
        key: ${{ runner.os }}-buildozer-${{ hashFiles('android/buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip \
          openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          libxml2-dev libxslt1-dev \
          libjpeg-dev \
          libgl1-mesa-dev libgles2-mesa-dev \
          wget
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 'latest'
        accept-android-sdk-licenses: true
        packages: 'platforms;android-33 build-tools;33.0.2'
    
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython setuptools
    
    - name: Create __init__.py in srltcp if missing
      run: |
        if [ ! -f srltcp/__init__.py ]; then
          echo "# SRLTCP package" > srltcp/__init__.py
        fi
    
    - name: Build APK
      run: |
        cd android
        buildozer -v android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SRLTCP-app
        path: android/bin/*.apk
