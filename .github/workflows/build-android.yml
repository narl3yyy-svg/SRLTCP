name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip \
          openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          libxml2-dev libxslt1-dev \
          libjpeg-dev \
          libgl1-mesa-dev libgles2-mesa-dev \
          wget
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 'latest'
        accept-android-sdk-licenses: true
        packages: 'platforms;android-33 build-tools;33.0.2'
    
    - name: Setup NDK 25c
      run: |
        mkdir -p /home/runner/.buildozer/android/platform/
        cd /home/runner/.buildozer/android/platform/
        wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
        unzip -q android-ndk-r25c-linux.zip
        rm android-ndk-r25c-linux.zip
        echo "NDK installed at /home/runner/.buildozer/android/platform/android-ndk-r25c"
    
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython setuptools
    
    - name: Set environment variables
      run: |
        echo "ANDROIDAPI=33" >> $GITHUB_ENV
        echo "ANDROIDMINAPI=21" >> $GITHUB_ENV
        echo "ANDROIDNDK=/home/runner/.buildozer/android/platform/android-ndk-r25c" >> $GITHUB_ENV
    
    - name: Build APK
      run: |
        cd android
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SRLTCP-app
        path: android/bin/*.apk
