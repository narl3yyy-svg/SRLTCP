name: Build Android APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONFORANDROID_PREREQUISITES_INSTALL_INTERACTIVE: "0"
  P4A_RELEASE_TAG: master
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Manual Android SDK Setup
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d latest
          rm cmdline-tools.zip

          SDKMGR="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"

          mkdir -p ~/.android/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b52d4d789" > ~/.android/licenses/android-sdk-license
          echo "84831b9409646a918e30561babd6857c" > ~/.android/licenses/android-sdk-preview-license
          echo "d975f451698547eaa9f5f62cc9c1b58c" > ~/.android/licenses/android-sdk-arm-dbt-license

          yes | $SDKMGR --licenses
          $SDKMGR "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;26.1.10909125"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git zip unzip autoconf automake libtool pkg-config \
            zlib1g-dev libncurses-dev libtinfo6 cmake libffi-dev libssl-dev libltdl-dev gettext autopoint

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Buildozer + P4A
        run: |
          pip install "buildozer>=1.5.0" "cython==0.29.34" setuptools
          pip install "git+https://github.com/kivy/python-for-android@${P4A_RELEASE_TAG}"

      - name: Build APK
        working-directory: android
        run: |
          buildozer -v android debug 2>&1 | tee ../buildozer.log

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer.log

      - name: Rename APK
        run: |
          pip install -e .
          VERSION=$(python -c "import srltcp; print(getattr(srltcp, '__version__', '0.1.34'))" 2>/dev/null || echo "0.1.34")
          echo "Version: $VERSION"
          APK=$(find android/bin -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" "android/bin/SRLTCP-${VERSION}.apk"
            echo "APK ready: SRLTCP-${VERSION}.apk"
            ls -la android/bin/
          else
            echo "No APK found!"
            ls -la android/bin/ || true
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: srltcp-apk
          path: android/bin/SRLTCP-*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/bin/SRLTCP-*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
