name: Build Android APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONFORANDROID_PREREQUISITES_INSTALL_INTERACTIVE: "0"
  P4A_RELEASE_TAG: master
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK (includes sdkmanager)
        uses: android-actions/setup-android@v4
        with:
          packages: |
            platforms;android-35
            build-tools;35.0.0
            ndk;26.1.10909125

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git zip unzip autoconf automake libtool pkg-config \
            zlib1g-dev libncurses-dev libtinfo6 cmake libffi-dev libssl-dev \
            libltdl-dev gettext autopoint

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Buildozer + python-for-android
        run: |
          pip install "buildozer>=1.5.0" "cython==0.29.34" setuptools
          pip install "git+https://github.com/kivy/python-for-android@${P4A_RELEASE_TAG}"

      - name: Verify config
        working-directory: android
        run: |
          grep -E 'python3==3\.12' buildozer.spec
          grep -E 'android\.api = 35' buildozer.spec
          grep -E 'android\.archs = arm64-v8a' buildozer.spec

      - name: Clean stale builds
        run: |
          rm -rf ~/.buildozer/android/platform/build-*
          rm -rf android/.buildozer/android/platform/build-*

      - name: Build APK with Buildozer
        working-directory: android
        run: |
          buildozer -v android debug 2>&1 | tee ../buildozer.log

      - name: Upload build log on failure
