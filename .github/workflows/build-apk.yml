name: Build Android APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONFORANDROID_PREREQUISITES_INSTALL_INTERACTIVE: "0"
  P4A_RELEASE_TAG: master
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.8"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git zip unzip autoconf automake libtool pkg-config \
            zlib1g-dev libncurses-dev libtinfo6 cmake libffi-dev libssl-dev \
            libltdl-dev gettext autopoint

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Buildozer toolchain
        run: |
          python --version
          pip install "buildozer>=1.5.0" "cython==0.29.34" setuptools
          pip install "git+https://github.com/kivy/python-for-android@${P4A_RELEASE_TAG}"

      - name: Verify Android Python pin
        working-directory: android
        run: |
          grep -E 'python3==3\.12' buildozer.spec
          grep -E 'android\.api = 35' buildozer.spec
          grep -E 'android\.archs = arm64-v8a' buildozer.spec
          grep -E 'p4a\.local_recipes = p4a-recipes' buildozer.spec
          test -f p4a-recipes/python3/__init__.py
          python - <<'PY'
          import pythonforandroid
          from os.path import dirname, join, isfile
          from importlib.util import spec_from_file_location, module_from_spec
          spec = spec_from_file_location(
              "srltcp_p4a_python3",
              "p4a-recipes/python3/__init__.py",
          )
          mod = module_from_spec(spec)
          spec.loader.exec_module(mod)
          recipe = mod.recipe
          recipe.ctx = type("Ctx", (), {"local_recipes": "p4a-recipes"})()
          upstream = join(dirname(pythonforandroid.__file__), "recipes", "python3")
          assert recipe.get_recipe_dir() == upstream
          patch = join(upstream, "patches", "reproducible-buildinfo.diff")
          assert isfile(patch), patch
          PY
          python --version | grep '3.12'
          python - <<'PY'
          from configparser import ConfigParser
          cfg = ConfigParser()
          cfg.read("buildozer.spec")
          archs = cfg.get("app", "android.archs")
          assert archs.strip() == "arm64-v8a", f"expected arm64-v8a in [app], got {archs!r}"
          PY

      - name: Clean stale P4A builds
        run: |
          rm -rf ~/.buildozer/android/platform/build-*
          rm -rf android/.buildozer
          rm -rf android/bin/*.apk

      - name: Bootstrap Android SDK (API 35 / Android 15)
        run: |
          set -e
          SDK="$ANDROID_HOME"
          SDKMGR="$SDK/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMGR" ]; then
            SDKMGR=$(find "$SDK" -name sdkmanager -type f 2>/dev/null | head -1)
          fi
          if [ -z "$SDKMGR" ] || [ ! -x "$SDKMGR" ]; then
            echo "sdkmanager not found under $SDK"
            find "$SDK" -maxdepth 5 -type f 2>/dev/null | head -30
            exit 1
          fi
          mkdir -p "$HOME/.android/licenses"
          printf '24333f8a63b6825ea9c5514f83c2829b52d4d789\n' > "$HOME/.android/licenses/android-sdk-license"
          printf '84831b9409646a918e30561babd6857c\n' > "$HOME/.android/licenses/android-sdk-preview-license"
          printf 'd975f451698547eaa9f5f62cc9c1b58c\n' > "$HOME/.android/licenses/android-sdk-arm-dbt-license"
          touch "$HOME/.android/repositories.cfg"
          mkdir -p "$SDK/licenses"
          cp "$HOME/.android/licenses/"* "$SDK/licenses/"
          yes | "$SDKMGR" --sdk_root="$SDK" --licenses
          "$SDKMGR" --sdk_root="$SDK" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;26.1.10909125"
          AIDL=$(find "$SDK/build-tools" -name aidl -type f 2>/dev/null | head -1)
          if [ -z "$AIDL" ]; then
            echo "Aidl not found after SDK bootstrap"
            ls -la "$SDK/build-tools/" 2>/dev/null || true
            exit 1
          fi
          echo "Found aidl at $AIDL"
          # Buildozer still looks for legacy tools/bin/sdkmanager
          mkdir -p "$SDK/tools/bin"
          ln -sf "$SDK/cmdline-tools/latest/bin/sdkmanager" "$SDK/tools/bin/sdkmanager"
          test -x "$SDK/tools/bin/sdkmanager"
          test -d "$SDK/ndk/26.1.10909125"
          echo "ANDROIDSDK=$SDK" >> "$GITHUB_ENV"
          echo "ANDROIDNDK=$SDK/ndk/26.1.10909125" >> "$GITHUB_ENV"
          mkdir -p "$HOME/.buildozer/android/platform"
          rm -rf "$HOME/.buildozer/android/platform/android-sdk"
          rm -rf "$HOME/.buildozer/android/platform/android-ndk-r26b"
          ln -sfn "$SDK" "$HOME/.buildozer/android/platform/android-sdk"
          ln -sfn "$SDK/ndk/26.1.10909125" "$HOME/.buildozer/android/platform/android-ndk-r26b"
          test -x "$HOME/.buildozer/android/platform/android-sdk/platform-tools/adb"
          test -d "$HOME/.buildozer/android/platform/android-ndk-r26b"
          ls -la "$HOME/.buildozer/android/platform/android-sdk/build-tools/"
          ls -la "$HOME/.buildozer/android/platform/android-sdk/ndk/"

      - name: Build debug APK with python-for-android
        working-directory: android
        run: |
          set -o pipefail
          test -x "$HOME/.buildozer/android/platform/android-sdk/platform-tools/adb"
          test -d "$HOME/.buildozer/android/platform/android-ndk-r26b"
          test -x "$HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager"
          buildozer -v android debug 2>&1 | tee ../buildozer.log
          if grep -E 'build-arm64-v8a_armeabi|Creating build for arch armeabi' ../buildozer.log; then
            echo "Unexpected armeabi-v7a build — android.archs must be under [app] in buildozer.spec"
            exit 1
          fi
          if ! grep -q 'build-arm64-v8a' ../buildozer.log; then
            echo "Expected arm64-v8a storage dir not found in build log"
            exit 1
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer.log

      - name: Rename APK
        run: |
          pip install -e .
          VERSION=$(python -c "import srltcp; print(srltcp.__version__)")
          APK=$(find android/bin -maxdepth 1 -name '*.apk' | head -1)
          test -n "$APK"
          cp "$APK" "android/bin/SRLTCP-${VERSION}.apk"
          ls -la android/bin/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: srltcp-apk
          path: android/bin/SRLTCP-*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/bin/SRLTCP-*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}