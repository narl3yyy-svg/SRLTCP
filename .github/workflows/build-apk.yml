name: Build Android APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONFORANDROID_PREREQUISITES_INSTALL_INTERACTIVE: "0"
  P4A_RELEASE_TAG: master
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 150   # increased a bit

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          # Let it use the latest stable without forcing version
          packages: platform-tools,platforms;android-35,build-tools;35.0.0,ndk;26.1.10909125

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git zip unzip autoconf automake libtool pkg-config \
            zlib1g-dev libncurses-dev libtinfo6 cmake libffi-dev libssl-dev libltdl-dev gettext autopoint

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Buildozer + python-for-android
        run: |
          pip install "buildozer>=1.5.0" "cython==0.29.34" setuptools
          pip install "git+https://github.com/kivy/python-for-android@${P4A_RELEASE_TAG}"

      - name: Verify buildozer.spec
        working-directory: android
        run: cat buildozer.spec

      - name: Clean previous builds
        run: rm -rf ~/.buildozer android/.buildozer

      - name: Build APK
        working-directory: android
        run: |
          echo "=== Starting Buildozer ==="
          buildozer -v android debug 2>&1 | tee ../buildozer.log
          echo "=== Build finished ==="
          ls -la bin/ || echo "No APK generated"

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer.log

      - name: Rename APK
        run: |
          pip install -e .
          VERSION=$(python -c "import srltcp; print(getattr(srltcp, '__version__', '0.1.30'))" 2>/dev/null || echo "0.1.30")
          APK=$(find android/bin -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" "android/bin/SRLTCP-${VERSION}.apk"
            echo "APK created: SRLTCP-${VERSION}.apk"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: srltcp-apk
          path: android/bin/SRLTCP-*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/bin/SRLTCP-*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
