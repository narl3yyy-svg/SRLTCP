name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build APK with Buildozer (forced root)
        run: |
          docker run --rm \
            -v "$PWD":/app \
            -w /app/android \
            ghcr.io/kivy/buildozer \
            bash -c '
              export BUILDOZER_ALLOW_ROOT=1
              python3 -c "
from buildozer import Buildozer
import sys

b = Buildozer()
b.warn_on_root = False
b.allow_root = True

# Run the android debug command directly
sys.argv = ['buildozer', 'android', 'debug']
b.run_command(sys.argv[1:])
"
            '

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SRLTCP-APK
          path: android/bin/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/bin/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
