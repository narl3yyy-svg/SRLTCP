name: Build Android APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk autoconf automake libtool pkg-config \
            zlib1g-dev libncurses-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev

      - name: Install Buildozer
        run: pip install buildozer cython

      - name: Build debug APK with python-for-android
        working-directory: android
        run: buildozer -v android debug

      - name: Rename APK
        run: |
          VERSION=$(python -c "import srltcp; print(srltcp.__version__)")
          APK=$(find android/bin -maxdepth 1 -name '*.apk' | head -1)
          test -n "$APK"
          cp "$APK" "android/bin/SRLTCP-${VERSION}.apk"
          ls -la android/bin/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: srltcp-apk
          path: android/bin/SRLTCP-*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/bin/SRLTCP-*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}